# Lefthook configuration for Python
# Generated by harness-workflow init

pre-commit:
  parallel: true
  commands:
    ruff:
      glob: "*.py"
      run: ruff check {staged_files}
      stage_fixed: true

    ruff-format:
      glob: "*.py"
      run: ruff format --check {staged_files}

    mypy:
      glob: "*.py"
      run: mypy {staged_files} --ignore-missing-imports

    secrets:
      run: |
        if grep -rE "(api_key|password|secret|token)\s*=\s*['\"][^'\"]+['\"]" {staged_files}; then
          echo "Potential secrets detected"
          exit 1
        fi

pre-push:
  commands:
    test:
      run: pytest --cov=src --cov-fail-under=80

    safety:
      run: safety check
