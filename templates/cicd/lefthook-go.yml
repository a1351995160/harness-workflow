# Lefthook configuration for Go
# Generated by harness-workflow init

pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -l {staged_files}

    goimports:
      glob: "*.go"
      run: goimports -l {staged_files}

    go-vet:
      glob: "*.go"
      run: go vet ./...

    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --fast

pre-push:
  commands:
    test:
      run: go test -v -race -coverprofile=coverage.out ./...

    coverage:
      run: |
        go tool cover -func=coverage.out | grep total | awk '{if ($3+0 < 80) exit 1}'
