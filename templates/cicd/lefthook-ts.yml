# Lefthook configuration for TypeScript/JavaScript
# Generated by harness-workflow init

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,jsx,ts,tsx}"
      run: npx eslint {staged_files}
      stage_fixed: true

    prettier:
      glob: "*.{js,jsx,ts,tsx,json,css,md}"
      run: npx prettier --check {staged_files}

    typecheck:
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit

    secrets:
      run: |
        if grep -rE "(api_key|password|secret|token)\s*=\s*['\"][^'\"]+['\"]" {staged_files}; then
          echo "Potential secrets detected"
          exit 1
        fi

pre-push:
  commands:
    test:
      run: npm run test:coverage
      env:
        CI: true

    security:
      run: npm audit --audit-level=moderate
